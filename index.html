<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nyrell Itempreise</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0b0f14;
        color: #e8e8e8;
      }
      main {
        max-width: 880px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .card {
        background: #121720;
        border: 1px solid #202733;
        border-radius: 14px;
        padding: 16px;
      }
      a {
        color: #9ecbff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Nyrell Itempreise</h1>
      <p>GitHub Pages Entry. Diese Seite kann später durch einen Build der UI ersetzt werden.</p>
      <div class="card">
        <p>Repository enthält Scripts, Policies und UI unter <code>ui/</code>.</p>
        <p>Für die UI lokal: <code>cd ui</code>, <code>npm install</code>, <code>npm run dev</code>.</p>
      </div>
    </main>
  </body>
</html>
